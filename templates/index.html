<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRYPTO TRADING LOG</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#050a0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="交易紀錄">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<style>
  :root {
    --bg: #050a0e;
    --bg2: #0a1520;
    --bg3: #0f1e2e;
    --border: #1a3a5c;
    --cyan: #00d4ff;
    --green: #00ff88;
    --red: #ff3366;
    --yellow: #ffd700;
    --text: #c8e6f5;
    --text2: #6a9ab0;
    --long: #00ff88;
    --short: #ff3366;
    --glow-cyan: 0 0 8px rgba(0,212,255,0.6);
    --glow-green: 0 0 8px rgba(0,255,136,0.6);
    --glow-red: 0 0 8px rgba(255,51,102,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', 'SF Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    border: 2px solid var(--cyan);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: var(--glow-cyan), inset 0 0 10px rgba(0,212,255,0.1);
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: var(--glow-cyan), inset 0 0 10px rgba(0,212,255,0.1); }
    50% { box-shadow: 0 0 20px rgba(0,212,255,0.8), inset 0 0 20px rgba(0,212,255,0.2); }
  }

  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
  }

  .logo span {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 2px;
    display: block;
  }

  .header-time {
    text-align: right;
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 1px;
  }

  #live-time {
    font-size: 18px;
    color: var(--cyan);
    font-weight: bold;
    display: block;
    text-shadow: var(--glow-cyan);
  }

  /* Stats bar */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  .stat-label {
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: bold;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
  }

  .stat-value.positive { color: var(--green); text-shadow: var(--glow-green); }
  .stat-value.negative { color: var(--red); text-shadow: var(--glow-red); }
  .stat-value.neutral { color: var(--yellow); text-shadow: 0 0 8px rgba(255,215,0,0.6); }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    padding: 8px 20px;
    border: 1px solid var(--cyan);
    background: transparent;
    color: var(--cyan);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn:hover {
    background: rgba(0,212,255,0.15);
    box-shadow: var(--glow-cyan);
  }

  .btn.primary {
    background: rgba(0,212,255,0.1);
    box-shadow: var(--glow-cyan);
  }

  .btn.danger {
    border-color: var(--red);
    color: var(--red);
  }
  .btn.danger:hover {
    background: rgba(255,51,102,0.15);
    box-shadow: var(--glow-red);
  }

  .filter-group {
    display: flex; gap: 6px; margin-left: auto;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,212,255,0.08);
  }

  /* Table */
  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--bg3);
    padding: 12px 14px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text2);
    text-transform: uppercase;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  thead th:first-child { padding-left: 20px; }

  tbody tr {
    border-bottom: 1px solid rgba(26,58,92,0.4);
    transition: background 0.15s;
  }

  tbody tr:hover { background: rgba(0,212,255,0.04); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 13px 14px;
    font-size: 13px;
    vertical-align: middle;
  }

  td:first-child { padding-left: 20px; }

  .coin-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .coin-badge {
    font-weight: bold;
    font-size: 14px;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    min-width: 60px;
  }

  .direction-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .direction-badge.long {
    background: rgba(0,255,136,0.12);
    border: 1px solid var(--long);
    color: var(--long);
    text-shadow: var(--glow-green);
  }

  .direction-badge.short {
    background: rgba(255,51,102,0.12);
    border: 1px solid var(--short);
    color: var(--short);
    text-shadow: var(--glow-red);
  }

  .rr-badge {
    font-weight: bold;
    color: var(--yellow);
  }

  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 1px;
  }

  .status-badge.active {
    background: rgba(0,212,255,0.1);
    border: 1px solid var(--cyan);
    color: var(--cyan);
  }

  .status-badge.win {
    background: rgba(0,255,136,0.1);
    border: 1px solid var(--green);
    color: var(--green);
  }

  .status-badge.loss {
    background: rgba(255,51,102,0.1);
    border: 1px solid var(--red);
    color: var(--red);
  }

  .status-badge.closed {
    background: rgba(106,154,176,0.1);
    border: 1px solid var(--text2);
    color: var(--text2);
  }

  .pnl-positive { color: var(--green); font-weight: bold; text-shadow: var(--glow-green); }
  .pnl-negative { color: var(--red); font-weight: bold; text-shadow: var(--glow-red); }
  .pnl-null { color: var(--text2); }

  .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .action-btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .action-btn.del:hover { border-color: var(--red); color: var(--red); }
  .action-btn.tp { border-color: var(--green); color: var(--green); }
  .action-btn.tp:hover { background: rgba(0,255,136,0.15); box-shadow: var(--glow-green); }
  .action-btn.sl { border-color: var(--red); color: var(--red); }
  .action-btn.sl:hover { background: rgba(255,51,102,0.15); box-shadow: var(--glow-red); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
    font-size: 13px;
    letter-spacing: 2px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,10,14,0.85);
    z-index: 100;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 30px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 0 60px rgba(0,212,255,0.15);
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  .modal-title {
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text2);
    text-transform: uppercase;
  }

  input, select, textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 4px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.12);
  }

  textarea { resize: vertical; min-height: 60px; }

  select option { background: var(--bg3); }

  .direction-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .dir-btn {
    padding: 9px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .dir-btn.long.active {
    background: rgba(0,255,136,0.15);
    color: var(--green);
    text-shadow: var(--glow-green);
  }

  .dir-btn.short.active {
    background: rgba(255,51,102,0.15);
    color: var(--red);
    text-shadow: var(--glow-red);
  }

  .rr-preview {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }

  .rr-preview span {
    color: var(--yellow);
    font-weight: bold;
  }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

  .date-cell { color: var(--text2); font-size: 11px; }
  .price-cell { color: var(--text); font-size: 12px; }
  .condition-cell { color: var(--text2); font-size: 11px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">₿</div>
      <div>
        <h1>CRYPTO LOG</h1>
        <span>TRADING RECORD SYSTEM v1.0</span>
      </div>
    </div>
    <div class="header-time">
      <span id="live-time">--:--:--</span>
      <span id="live-date" style="font-size:11px;color:var(--text2)"></span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card">
      <div class="stat-label">總交易</div>
      <div class="stat-value" id="stat-total">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">進行中</div>
      <div class="stat-value neutral" id="stat-active">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">勝率</div>
      <div class="stat-value" id="stat-winrate">-%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">盈 / 虧</div>
      <div class="stat-value" style="font-size:16px">
        <span id="stat-wins" style="color:var(--green)">-</span>
        <span style="color:var(--text2);font-size:14px"> / </span>
        <span id="stat-losses" style="color:var(--red)">-</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">平均盈虧比</div>
      <div class="stat-value neutral" id="stat-rr">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">累計損益</div>
      <div class="stat-value" id="stat-pnl">-</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn primary" onclick="openModal()">+ 新增交易</button>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('ALL', this)">ALL</button>
      <button class="filter-btn" onclick="setFilter('進行中', this)">進行中</button>
      <button class="filter-btn" onclick="setFilter('止盈', this)">止盈</button>
      <button class="filter-btn" onclick="setFilter('止損', this)">止損</button>
      <button class="filter-btn" onclick="setFilter('已平倉', this)">已平倉</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>日期 / 時間</th>
          <th>幣種</th>
          <th>方向</th>
          <th>進場價</th>
          <th>止盈</th>
          <th>止損</th>
          <th>盈虧比</th>
          <th>止損金額</th>
          <th>條件</th>
          <th>獲利/虧損</th>
          <th>狀態</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="trade-tbody">
        <tr><td colspan="12" class="empty-state">[ 載入中... ]</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">新增交易紀錄</div>
    <div class="form-grid">
      <div class="form-group">
        <label>幣種</label>
        <input type="text" id="f-coin" placeholder="BTC / ETH / SOL">
      </div>
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>時間</label>
        <input type="time" id="f-time" placeholder="HH:MM">
      </div>
      <div class="form-group full">
        <label>方向</label>
        <div class="direction-toggle">
          <button class="dir-btn long active" id="dir-long" onclick="setDir('LONG')">做多 LONG</button>
          <button class="dir-btn short" id="dir-short" onclick="setDir('SHORT')">做空 SHORT</button>
        </div>
      </div>
      <div class="form-group">
        <label>進場價</label>
        <input type="number" id="f-entry" placeholder="0.00" oninput="calcRR()">
      </div>
      <div class="form-group">
        <label>止盈 (TP)</label>
        <input type="number" id="f-tp" placeholder="0.00" oninput="calcRR()">
      </div>
      <div class="form-group">
        <label>止損 (SL)</label>
        <input type="number" id="f-sl" placeholder="0.00" oninput="calcRR()">
      </div>
      <div class="form-group" style="display:flex;flex-direction:column;justify-content:flex-end">
        <div class="rr-preview">盈虧比 R:R = <span id="rr-calc">--</span></div>
      </div>
      <div class="form-group">
        <label>止損金額 (USDT)</label>
        <input type="number" id="f-risk" placeholder="例：100">
      </div>
      <div class="form-group">
        <label>進場條件 / 策略</label>
        <input type="text" id="f-condition" placeholder="例：突破關鍵壓力位 + RSI 背離">
      </div>
      <div class="form-group">
        <label>獲利/虧損 (USDT)</label>
        <input type="number" id="f-pnl" placeholder="結算後填入">
      </div>
      <div class="form-group">
        <label>狀態</label>
        <select id="f-status">
          <option value="進行中">進行中</option>
          <option value="止盈">止盈</option>
          <option value="止損">止損</option>
          <option value="已平倉">已平倉</option>
        </select>
      </div>
      <div class="form-group full">
        <label>備註</label>
        <textarea id="f-notes" placeholder="心得、複盤筆記..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="submitTrade()">確認送出</button>
    </div>
  </div>
</div>

<script>
let allTrades = [];
let currentFilter = 'ALL';
let editId = null;
let currentDir = 'LONG';

// Live clock
function updateClock() {
  const now = new Date();
  document.getElementById('live-time').textContent =
    now.toLocaleTimeString('zh-TW', { hour12: false });
  document.getElementById('live-date').textContent =
    now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
}
setInterval(updateClock, 1000);
updateClock();

// Set today as default date
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

function setDir(dir) {
  currentDir = dir;
  document.getElementById('dir-long').classList.toggle('active', dir === 'LONG');
  document.getElementById('dir-short').classList.toggle('active', dir === 'SHORT');
  calcRR();
}

function calcRR() {
  const entry = parseFloat(document.getElementById('f-entry').value);
  const tp = parseFloat(document.getElementById('f-tp').value);
  const sl = parseFloat(document.getElementById('f-sl').value);
  const el = document.getElementById('rr-calc');

  if (!entry || !tp || !sl) { el.textContent = '--'; return; }

  let reward, risk;
  if (currentDir === 'LONG') {
    reward = tp - entry;
    risk = entry - sl;
  } else {
    reward = entry - tp;
    risk = sl - entry;
  }

  if (risk <= 0) { el.textContent = '⚠ 止損設定錯誤'; el.style.color = 'var(--red)'; return; }
  const rr = (reward / risk).toFixed(2);
  el.textContent = `${rr}R`;
  el.style.color = rr >= 2 ? 'var(--green)' : rr >= 1 ? 'var(--yellow)' : 'var(--red)';
}

async function loadTrades() {
  const res = await fetch('/api/trades');
  allTrades = await res.json();
  renderTable();
  loadStats();
}

async function loadStats() {
  const res = await fetch('/api/stats');
  const s = await res.json();
  document.getElementById('stat-total').textContent = s.total;
  document.getElementById('stat-active').textContent = s.active;
  document.getElementById('stat-wins').textContent = s.wins;
  document.getElementById('stat-losses').textContent = s.losses;
  document.getElementById('stat-rr').textContent = s.avg_rr ? s.avg_rr + 'R' : '-';

  const wr = document.getElementById('stat-winrate');
  wr.textContent = s.win_rate + '%';
  wr.className = 'stat-value ' + (s.win_rate >= 50 ? 'positive' : s.win_rate > 0 ? 'negative' : '');

  const pnl = document.getElementById('stat-pnl');
  pnl.textContent = (s.total_pnl >= 0 ? '+' : '') + s.total_pnl + ' U';
  pnl.className = 'stat-value ' + (s.total_pnl > 0 ? 'positive' : s.total_pnl < 0 ? 'negative' : '');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  const trades = currentFilter === 'ALL'
    ? allTrades
    : allTrades.filter(t => t.status === currentFilter);

  const tbody = document.getElementById('trade-tbody');
  if (!trades.length) {
    tbody.innerHTML = `<tr><td colspan="12" class="empty-state">[ 暫無交易紀錄 ]</td></tr>`;
    return;
  }

  tbody.innerHTML = trades.map(t => {
    const dirClass = t.direction === 'LONG' ? 'long' : 'short';
    const dirLabel = t.direction === 'LONG' ? '做多' : '做空';

    let statusClass = 'active';
    if (t.status === '止盈') statusClass = 'win';
    else if (t.status === '止損') statusClass = 'loss';
    else if (t.status === '已平倉') statusClass = 'closed';

    const pnl = t.pnl !== null && t.pnl !== undefined
      ? `<span class="${t.pnl > 0 ? 'pnl-positive' : t.pnl < 0 ? 'pnl-negative' : 'pnl-null'}">${t.pnl > 0 ? '+' : ''}${t.pnl} U</span>`
      : `<span class="pnl-null">-</span>`;

    const rr = t.rr_ratio ? `<span class="rr-badge">${t.rr_ratio}R</span>` : '-';

    return `<tr>
      <td class="date-cell">${t.date}${t.trade_time ? '<br><span style="color:var(--cyan);font-size:11px">' + t.trade_time + '</span>' : ''}</td>
      <td><div class="coin-cell"><span class="coin-badge">${t.coin}</span></div></td>
      <td><span class="direction-badge ${dirClass}">${dirLabel}</span></td>
      <td class="price-cell">${t.entry_price}</td>
      <td class="price-cell" style="color:var(--green)">${t.take_profit}</td>
      <td class="price-cell" style="color:var(--red)">${t.stop_loss}</td>
      <td>${rr}</td>
      <td class="price-cell" style="color:var(--red)">${t.risk_amount ? t.risk_amount + 'U' : '-'}</td>
      <td class="condition-cell" title="${t.condition || ''}">${t.condition || '-'}</td>
      <td>${pnl}</td>
      <td><span class="status-badge ${statusClass}">${t.status}</span></td>
      <td>
        <div class="action-btns">
          ${t.status === '進行中' ? `
            <button class="action-btn tp" onclick="quickClose(${t.id}, '止盈')">止盈</button>
            <button class="action-btn sl" onclick="quickClose(${t.id}, '止損')">止損</button>
          ` : ''}
          <button class="action-btn" onclick="openEdit(${t.id})">編輯</button>
          <button class="action-btn del" onclick="deleteTrade(${t.id})">刪除</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function openModal() {
  editId = null;
  document.getElementById('modal-title').textContent = '新增交易紀錄';
  document.getElementById('f-coin').value = '';
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-entry').value = '';
  document.getElementById('f-tp').value = '';
  document.getElementById('f-sl').value = '';
  document.getElementById('f-time').value = '';
  document.getElementById('f-risk').value = '';
  document.getElementById('f-condition').value = '';
  document.getElementById('f-pnl').value = '';
  document.getElementById('f-status').value = '進行中';
  document.getElementById('f-notes').value = '';
  document.getElementById('rr-calc').textContent = '--';
  setDir('LONG');
  document.getElementById('modal').classList.add('open');
}

function openEdit(id) {
  const t = allTrades.find(x => x.id === id);
  if (!t) return;
  editId = id;
  document.getElementById('modal-title').textContent = '編輯交易紀錄';
  document.getElementById('f-coin').value = t.coin;
  document.getElementById('f-date').value = t.date;
  document.getElementById('f-entry').value = t.entry_price;
  document.getElementById('f-tp').value = t.take_profit;
  document.getElementById('f-sl').value = t.stop_loss;
  document.getElementById('f-time').value = t.trade_time || '';
  document.getElementById('f-risk').value = t.risk_amount ?? '';
  document.getElementById('f-condition').value = t.condition || '';
  document.getElementById('f-pnl').value = t.pnl ?? '';
  document.getElementById('f-status').value = t.status;
  document.getElementById('f-notes').value = t.notes || '';
  setDir(t.direction);
  calcRR();
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

async function submitTrade() {
  const coin = document.getElementById('f-coin').value.trim();
  const entry = document.getElementById('f-entry').value;
  const tp = document.getElementById('f-tp').value;
  const sl = document.getElementById('f-sl').value;

  if (!coin || !entry || !tp || !sl) {
    alert('幣種、進場價、止盈、止損為必填');
    return;
  }

  const body = {
    coin,
    date: document.getElementById('f-date').value,
    direction: currentDir,
    entry_price: entry,
    take_profit: tp,
    stop_loss: sl,
    trade_time: document.getElementById('f-time').value || null,
    risk_amount: document.getElementById('f-risk').value || null,
    condition: document.getElementById('f-condition').value,
    pnl: document.getElementById('f-pnl').value || null,
    status: document.getElementById('f-status').value,
    notes: document.getElementById('f-notes').value,
  };

  const url = editId ? `/api/trades/${editId}` : '/api/trades';
  const method = editId ? 'PUT' : 'POST';

  await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  closeModal();
  loadTrades();
}

async function quickClose(id, status) {
  const t = allTrades.find(x => x.id === id);
  const body = { status };
  if (t && t.risk_amount && t.rr_ratio) {
    if (status === '止盈') body.pnl = parseFloat((t.risk_amount * t.rr_ratio).toFixed(2));
    if (status === '止損') body.pnl = parseFloat((-t.risk_amount).toFixed(2));
  }
  await fetch(`/api/trades/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  loadTrades();
}

async function deleteTrade(id) {
  if (!confirm('確定刪除這筆交易紀錄？')) return;
  await fetch(`/api/trades/${id}`, { method: 'DELETE' });
  loadTrades();
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadTrades();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js');
}
</script>
</body>
</html>
